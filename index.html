<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso - Lógica 2024</title>
    <style>
        /* Reset e Box-Sizing */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Courier New', Courier, monospace; 
        }

        /* Estilização do Body */
        body { 
            background-color: #0b0c10; 
            color: #66fcf1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* Container de Login */
       .login-container { 
            background-color: #1f2833; 
            border: 2px solid #95ed19; 
            padding: 40px; 
            border-radius: 4px; 
            box-shadow: 0 0 20px rgba(149, 237, 25, 0.2); 
            width: 100%; 
            max-width: 400px; 
        }

        /* Cabeçalho de Login */
       .login-header { 
            text-align: center; 
            margin-bottom: 30px; 
        }

       .login-header h1 { 
            color: #95ed19; 
            font-size: 24px; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
        }

       .login-header p { 
            color: #c5c6c7; 
            font-size: 12px; 
            margin-top: 5px; 
        }

        /* Grupo de Inputs */
       .input-group { 
            margin-bottom: 20px; 
            position: relative; 
        }

       .input-group label { 
            display: block; 
            color: #95ed19; 
            font-size: 12px; 
            margin-bottom: 5px; 
            text-transform: uppercase; 
        }

       .input-group input { 
            width: 100%; 
            padding: 12px; 
            background-color: #0b0c10; 
            border: 1px solid #45f3ff; 
            color: #fff; 
            font-size: 14px; 
            border-radius: 4px; 
            outline: none; 
            transition: 0.3s; 
        }

       .input-group input:focus { 
            border-color: #95ed19; 
            box-shadow: 0 0 10px rgba(149, 237, 25, 0.5); 
        }

        /* Botão de Login */
       .btn-login { 
            width: 100%; 
            padding: 12px; 
            background-color: transparent; 
            border: 2px solid #95ed19; 
            color: #95ed19; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase; 
            transition: 0.3s; 
            margin-top: 10px; 
        }

       .btn-login:hover { 
            background-color: #95ed19; 
            color: #0b0c10; 
            box-shadow: 0 0 15px rgba(149, 237, 25, 0.6); 
        }

        /* Texto do rodapé */
       .footer-text { 
            text-align: center; 
            margin-top: 20px; 
            font-size: 11px; 
            color: #66fcf1; 
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Lógica de Programação</h1>
            <p>Insira o código de acesso</p>
        </div>
        
        <div class="input-group">
            <label for="accessCode">Código Secreto</label>
            <input type="text" id="accessCode" placeholder="Digite o código aqui...">
        </div>
        
        <button class="btn-login" onclick="verifyCode()">Acessar Terminal</button>
        
        <div class="footer-text">
            <p>© 2024 Sistema de Acesso Confidencial</p>
        </div>
    </div>

    <script>
        async function verifyCode() {
            const code = document.getElementById("accessCode").value.trim();
            if (!code) return alert("Insira um código!");

            try {
                const response = await fetch('/api/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code })
                });

                if (response.ok) {
                    window.location.href = "/dashboard.html";
                } else {
                    alert("Código incorreto!");
                }
            } catch (error) {
                console.error("Erro:", error);
                alert("Falha na conexão");
            }
        }
    </script>
</body>
</html>
